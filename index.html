<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Approval Prediction</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background: linear-gradient(120deg, #e0e7ff 0%, #f8fafc 100%);
            min-height: 100vh;
        }
        .card {
            border-radius: 1.5rem;
        }
        .btn-primary {
            font-weight: 600;
            letter-spacing: 1px;
        }
        #result .alert {
            font-size: 1.15rem;
            font-weight: 500;
            border-radius: 1rem;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="text-center mb-5">
            <h1 style="font-weight: 700; color: #2d3a4b; letter-spacing: 1px;">Loan Approval Predictor</h1>
            <p class="lead" style="color: #5a6d89;">Enter your details to check your loan approval status instantly!</p>
        </div>
        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10">
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-body p-4">
                        <form id="loanForm">
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label for="Gender" class="form-label">Gender</label>
                                    <select class="form-select" id="Gender" required>
                                        <option value="1">Male</option>
                                        <option value="0">Female</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label for="Married" class="form-label">Married</label>
                                    <select class="form-select" id="Married" required>
                                        <option value="1">Yes</option>
                                        <option value="0">No</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label for="Dependents" class="form-label">Dependents</label>
                                    <input type="number" class="form-control" id="Dependents" min="0" max="10" value="0" required>
                                </div>
                                <div class="col-md-4">
                                    <label for="Education" class="form-label">Education</label>
                                    <select class="form-select" id="Education" required>
                                        <option value="1">Graduate</option>
                                        <option value="0">Not Graduate</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label for="Self_Employed" class="form-label">Self Employed</label>
                                    <select class="form-select" id="Self_Employed" required>
                                        <option value="1">Yes</option>
                                        <option value="0">No</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label for="ApplicantIncome" class="form-label">Applicant Income</label>
                                    <input type="number" class="form-control" id="ApplicantIncome" min="0" value="5000" required>
                                </div>
                                <div class="col-md-4">
                                    <label for="CoapplicantIncome" class="form-label">Coapplicant Income</label>
                                    <input type="number" class="form-control" id="CoapplicantIncome" min="0" value="0" required>
                                </div>
                                <div class="col-md-4">
                                    <label for="LoanAmount" class="form-label">Loan Amount</label>
                                    <input type="number" class="form-control" id="LoanAmount" min="0" value="150" required>
                                </div>
                                <div class="col-md-4">
                                    <label for="Loan_Amount_Term" class="form-label">Loan Amount Term</label>
                                    <input type="number" class="form-control" id="Loan_Amount_Term" min="0" value="360" required>
                                </div>
                                <div class="col-md-4">
                                    <label for="Credit_History" class="form-label">Credit History</label>
                                    <select class="form-select" id="Credit_History" required>
                                        <option value="1">Good</option>
                                        <option value="0">Bad</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label for="Property_Area" class="form-label">Property Area</label>
                                    <select class="form-select" id="Property_Area" required>
                                        <option value="2">Urban</option>
                                        <option value="1">Semiurban</option>
                                        <option value="0">Rural</option>
                                    </select>
                                </div>
                            </div>
                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-primary btn-lg" style="background: linear-gradient(90deg,#4e54c8,#8f94fb); border: none;">Predict</button>
                            </div>
                        </form>
                        <div class="mt-4" id="result"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loanForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // 1. Gather Data
            const data = {
                Gender: parseInt(document.getElementById('Gender').value),
                Married: parseInt(document.getElementById('Married').value),
                Dependents: parseInt(document.getElementById('Dependents').value),
                Education: parseInt(document.getElementById('Education').value),
                Self_Employed: parseInt(document.getElementById('Self_Employed').value),
                ApplicantIncome: parseFloat(document.getElementById('ApplicantIncome').value),
                CoapplicantIncome: parseFloat(document.getElementById('CoapplicantIncome').value),
                LoanAmount: parseFloat(document.getElementById('LoanAmount').value),
                Loan_Amount_Term: parseFloat(document.getElementById('Loan_Amount_Term').value),
                Credit_History: parseFloat(document.getElementById('Credit_History').value),
                Property_Area: parseInt(document.getElementById('Property_Area').value)
            };

            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="alert alert-warning">Predicting, please wait...</div>';

            try {
                // 2. Point to the FULL backend URL
                // Change the port (8000) if your uvicorn terminal shows a different one.
                const response = await fetch('http://127.0.0.1:8000/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (!response.ok) {
                    throw new Error(`Server responded with status: ${response.status}`);
                }

                const result = await response.json();

                // 3. Display Results
                let color = result.status === 'Approved' ? 'success' : 'danger';
                let icon = result.status === 'Approved' ? '✔️' : '❌';
                
                if(result.error) {
                    resultDiv.innerHTML = `<div class="alert alert-danger"><strong>Error:</strong> ${result.error}</div>`;
                } else {
                    resultDiv.innerHTML = `
                        <div class="alert alert-${color} text-center">
                            <span style="font-size:2rem;">${icon}</span><br>
                            <strong>Status:</strong> ${result.status}<br>
                            <strong>Confidence:</strong> ${result.confidence}
                        </div>`;
                }

            } catch (err) {
                console.error("Fetch Error:", err);
                resultDiv.innerHTML = `<div class="alert alert-danger">
                    <strong>Connection Failed!</strong><br>
                    1. Ensure main.py is running in your terminal.<br>
                    2. Check if the URL is http://127.0.0.1:8000/predict<br>
                    3. Details: ${err.message}
                </div>`;
            }
        });
    </script>
</body>
</html>
